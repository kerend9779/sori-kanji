<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>部首 214</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0e0d; --card:#1c1a18; --card2:#242220; --border:#2e2b28;
  --accent:#e8a04a; --accent2:#c8623a;
  --text:#f0ece6; --text2:#a09080; --text3:#6a5f55;
  --green:#4caf7d; --red:#e05757;
  --btn-ng-bg:#2a1a1a; --btn-ng-c:#e05757; --btn-ng-b:#3d2020;
  --btn-ok-bg:#162318; --btn-ok-c:#4caf7d; --btn-ok-b:#1e3326;
  --shadow:none; --r:18px;
}
body.light {
  --bg:#f0ece5; --card:#ffffff; --card2:#e8e3da; --border:#cdc7bc;
  --accent:#b85c30; --accent2:#8f3e18;
  --text:#1a1612; --text2:#6b5f52; --text3:#9e9488;
  --green:#2b7a4b; --red:#be3a2e;
  --btn-ng-bg:#fde8e8; --btn-ng-c:#be3a2e; --btn-ng-b:#f5c0bb;
  --btn-ok-bg:#e4f5ec; --btn-ok-c:#2b7a4b; --btn-ok-b:#b8e0cb;
  --shadow:0 2px 18px rgba(0,0,0,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:32px;transition:background .2s,color .2s}
button{cursor:pointer;font-family:inherit}
.screen{display:none;width:100%;max-width:480px;flex-direction:column;align-items:center}
.screen.active{display:flex}

/* LIST */
.list-topbar{width:100%;padding:20px 20px 14px;display:flex;justify-content:space-between;align-items:center}
.list-brand{font-family:'Noto Sans JP',sans-serif;font-size:20px;font-weight:700;color:var(--accent);letter-spacing:.05em;line-height:1.2}
.list-brand .by{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:400;color:var(--text3);letter-spacing:.04em;margin-left:6px;vertical-align:middle}
.list-brand small{display:block;font-size:11px;color:var(--text3);font-weight:400;margin-top:3px}
.theme-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:22px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:5px;transition:all .15s}
.theme-btn:hover{border-color:var(--accent);color:var(--accent)}
.list-all-btn{margin:0 16px;width:calc(100% - 32px);background:var(--accent);border:none;border-radius:14px;padding:14px;font-size:14px;font-weight:700;color:#000;transition:background .15s}
.list-all-btn:hover{background:var(--accent2);color:#fff}
.group-list{width:100%;margin-top:10px}
.sg{width:100%;padding:0 16px 10px}
.sg-head{display:flex;justify-content:space-between;align-items:center;padding:9px 4px 7px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sg-title{font-size:13px;font-weight:700;color:var(--accent)}
.sg-right{display:flex;align-items:center;gap:8px}
.done-badge{font-size:11px;color:var(--green);border:1px solid var(--green);border-radius:8px;padding:2px 8px;font-weight:600}
.sg-btn{background:var(--card2);border:1px solid var(--border);border-radius:9px;color:var(--text2);font-size:12px;font-weight:600;padding:4px 12px;transition:all .15s}
.sg-btn:hover{border-color:var(--accent);color:var(--accent)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:5px 9px;display:flex;align-items:center;gap:5px}
.chip-k{font-family:'Noto Sans JP',sans-serif;font-size:17px;font-weight:400;color:var(--text)}
.chip-r{font-size:10px;color:var(--text3)}

/* STUDY */
.study-head{width:100%;padding:14px 16px 10px;display:flex;flex-direction:column;gap:9px}
.study-toprow{display:flex;justify-content:space-between;align-items:center}
.back-btn{background:none;border:1px solid var(--border);border-radius:9px;color:var(--text2);font-size:12px;padding:5px 12px;transition:all .15s}
.back-btn:hover{border-color:var(--accent);color:var(--accent)}
.study-title-area{text-align:center;flex:1}
.study-title{font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;color:var(--accent)}
.study-sub{font-size:11px;color:var(--text3);margin-top:2px}
.counters{display:flex;gap:8px;align-items:center}
.ctr{display:flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600}
.ctr .dot{width:7px;height:7px;border-radius:50%}
.ctr.ok .dot{background:var(--green)}
.ctr.ng .dot{background:var(--red)}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width .2s}
.prog-txt{font-size:11px;color:var(--text3);text-align:right}

/* CARD */
.card-wrap{width:100%;padding:0 14px;flex:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:26px 20px 22px;min-height:360px;display:flex;flex-direction:column;align-items:center;position:relative;box-shadow:var(--shadow);transition:background .2s,border-color .2s}
.card-bar{position:absolute;top:12px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap}
.stroke-tag{font-size:11px;color:var(--text3);background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:2px 8px;white-space:nowrap}
.card-actions{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.ca-btn{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:11px;padding:4px 9px;white-space:nowrap;transition:all .15s}
.ca-btn:hover{border-color:var(--accent);color:var(--accent)}
.ca-btn.on{background:var(--accent);border-color:var(--accent);color:#000}
.auto-cluster{display:flex;align-items:stretch;background:var(--card2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.ac-main{background:none;border:none;color:var(--text2);font-size:11px;padding:4px 8px;white-space:nowrap;transition:background .15s,color .15s}
.ac-main:hover{color:var(--accent)}
.ac-main.on{background:var(--red);color:#fff}
.ac-sep{width:1px;background:var(--border);flex-shrink:0}
.ac-step{background:none;border:none;color:var(--text2);font-size:13px;font-weight:700;padding:2px 6px;display:flex;align-items:center;transition:color .12s,background .12s}
.ac-step:hover{color:var(--accent);background:rgba(232,160,74,.1)}
.ac-val{font-size:11px;font-weight:700;color:var(--accent);min-width:26px;text-align:center;display:flex;align-items:center;justify-content:center;user-select:none}
.kanji-big{font-family:'Noto Sans JP',sans-serif;font-size:96px;font-weight:400;line-height:1;margin:46px 0 14px;color:var(--text);user-select:none}
.detail{width:100%}
.detail.hide{display:none}
.reading{text-align:center;font-size:20px;font-weight:700;color:var(--accent);margin-bottom:10px}
.assoc-box{background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:11px 15px;width:100%}
.assoc-lbl{font-size:10px;color:var(--text3);letter-spacing:.08em;margin-bottom:5px}
.assoc-txt{font-size:13px;color:var(--text);line-height:1.7}
.hint-area{margin-top:16px;text-align:center;width:100%}
.hint-btn{background:var(--card2);border:1px dashed var(--border);border-radius:10px;padding:9px 26px;font-size:13px;color:var(--text3);display:inline-block;transition:all .15s}
.hint-btn:hover{border-color:var(--accent);color:var(--accent);border-style:solid}
.timer-wrap{position:absolute;bottom:12px;right:14px;display:none}
.timer-wrap.show{display:block}
.t-svg{width:38px;height:38px;transform:rotate(-90deg)}
.t-bg{fill:none;stroke:var(--border);stroke-width:3}
.t-fg{fill:none;stroke:var(--accent);stroke-width:3;stroke-dasharray:94.25;stroke-dashoffset:0;stroke-linecap:round}
.t-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700;color:var(--accent)}

/* ACTION BUTTONS */
.btn-row{width:100%;padding:12px 14px 0;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.abtn{border:none;border-radius:13px;padding:14px 10px;font-size:14px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;transition:background .12s,color .12s,border-color .12s}
.abtn sub{font-size:10px;font-weight:400;opacity:.75}
.abtn:active{transform:scale(.96)}
.abtn-ng{background:var(--btn-ng-bg);color:var(--btn-ng-c);border:1px solid var(--btn-ng-b)}
.abtn-ng:hover,.abtn-ng.flash{background:var(--red);color:#fff;border-color:var(--red)}
.abtn-ok{background:var(--btn-ok-bg);color:var(--btn-ok-c);border:1px solid var(--btn-ok-b)}
.abtn-ok:hover{background:var(--green);color:#fff;border-color:var(--green)}
.round-row{font-size:11px;color:var(--text3);margin-top:9px;text-align:center}
.round-tag{display:inline-block;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:1px 8px;margin-left:4px;color:var(--accent);font-weight:600}

/* COMPLETE */
.done-screen{display:none;flex-direction:column;align-items:center;padding:40px 20px;text-align:center;gap:11px;width:100%;max-width:480px}
.done-screen.show{display:flex}
.done-emoji{font-size:46px}
.done-title{font-size:20px;font-weight:700;color:var(--accent)}
.done-sub{font-size:13px;color:var(--text2);line-height:1.9}
.dbtn{width:100%;border:none;border-radius:13px;padding:13px;font-size:14px;font-weight:700;transition:all .15s}
.dbtn.p{background:var(--accent);color:#000}
.dbtn.p:hover{background:var(--accent2);color:#fff}
.dbtn.s{background:var(--card2);color:var(--text2);border:1px solid var(--border)}
.dbtn.s:hover{border-color:var(--accent);color:var(--accent)}

/* SETTINGS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:flex-end;justify-content:center}
.overlay.show{display:flex}
.sheet{background:var(--card);border:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-width:480px;padding:26px 22px 38px;animation:up .2s cubic-bezier(.4,0,.2,1)}
@keyframes up{from{transform:translateY(50px);opacity:0}to{transform:none;opacity:1}}
.sheet-title{font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:20px}
.sheet-close{margin-left:auto;background:none;border:none;color:var(--text3);font-size:20px;line-height:1;padding:2px 6px}
.sheet-close:hover{color:var(--text)}
.srow{padding:16px 0;border-top:1px solid var(--border)}
.srow-label{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.srow-desc{font-size:11px;color:var(--text3);line-height:1.6;margin-bottom:12px}
.big-stepper{display:flex;align-items:center;justify-content:center;gap:18px;padding:4px 0 10px}
.big-step-btn{width:42px;height:42px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);color:var(--text);font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .12s;user-select:none}
.big-step-btn:hover{background:var(--accent);border-color:var(--accent);color:#000}
.big-num{font-family:'Noto Sans JP',sans-serif;font-size:40px;font-weight:700;color:var(--accent);min-width:72px;text-align:center;user-select:none}
.pchips{display:flex;flex-wrap:wrap;gap:7px}
.pchip{background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:5px 14px;font-size:12px;font-weight:600;color:var(--text2);transition:all .12s}
.pchip:hover{border-color:var(--accent);color:var(--accent)}
.pchip.sel{background:var(--accent);border-color:var(--accent);color:#000}
.theme-row{display:flex;gap:10px;margin-top:4px}
.theme-pick{flex:1;padding:12px 8px;border-radius:12px;background:var(--card2);border:2px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;text-align:center;transition:all .15s}
.theme-pick:hover{border-color:var(--accent);color:var(--accent)}
.theme-pick.sel{border-color:var(--accent);background:var(--accent);color:#000}
.apply-btn{width:100%;margin-top:22px;background:var(--accent);color:#000;border:none;border-radius:13px;padding:14px;font-size:14px;font-weight:700;transition:all .15s}
.apply-btn:hover{background:var(--accent2);color:#fff}
</style>
</head>
<body>

<!-- LIST -->
<div class="screen active" id="scr-list">
  <div class="list-topbar">
    <div class="list-brand">
      部首 214<span class="by">by sori</span>
      <small>일본어 부수 학습</small>
    </div>
    <button class="theme-btn" id="theme-top-btn" onclick="quickTheme()">
      <span id="theme-top-icon">☀️</span>
      <span id="theme-top-txt">라이트</span>
    </button>
  </div>
  <button class="list-all-btn" onclick="startStudy('all')">🗂 전체 214자 학습하기</button>
  <div class="group-list" id="group-list"></div>
</div>

<!-- STUDY -->
<div class="screen" id="scr-study">
  <div class="study-head">
    <div class="study-toprow">
      <button class="back-btn" onclick="goList()">← 목록</button>
      <div class="study-title-area">
        <div class="study-title" id="study-title">부수 학습</div>
        <div class="study-sub" id="study-sub"></div>
      </div>
      <div style="width:52px"></div>
    </div>
    <div class="counters">
      <div class="ctr ok"><span class="dot"></span><span id="cnt-ok">0</span> 학습완료</div>
      <div class="ctr ng"><span class="dot"></span><span id="cnt-ng">0</span> 다시</div>
      <div style="flex:1"></div>
      <div class="prog-txt" id="prog-txt">0 / 0</div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <div class="card-wrap">
    <div class="card">
      <div class="card-bar">
        <span class="stroke-tag" id="stroke-tag">1획</span>
        <div class="card-actions">
          <button class="ca-btn" id="reveal-btn" onclick="toggleReveal()">👁 전체보기</button>
          <button class="ca-btn" id="order-btn" onclick="toggleOrder()">순서대로</button>
          <div class="auto-cluster">
            <button class="ac-main" id="auto-main-btn" onclick="toggleAuto()">⏱ 자동</button>
            <div class="ac-sep"></div>
            <button class="ac-step" onclick="changeTime(-1)">−</button>
            <span class="ac-val" id="ac-val">5초</span>
            <button class="ac-step" onclick="changeTime(1)">+</button>
          </div>
        </div>
      </div>
      <div class="kanji-big" id="kanji-big">一</div>
      <div class="detail hide" id="detail">
        <div class="reading" id="reading">하나 일</div>
        <div class="assoc-box">
          <div class="assoc-lbl">연상 이미지</div>
          <div class="assoc-txt" id="assoc-txt">그냥 한 줄</div>
        </div>
      </div>
      <div class="hint-area" id="hint-area">
        <button class="hint-btn" id="hint-btn" onclick="toggleHint()">뜻 보기 👆</button>
      </div>
      <div class="timer-wrap" id="timer-wrap">
        <svg class="t-svg" viewBox="0 0 38 38">
          <circle class="t-bg" cx="19" cy="19" r="15"/>
          <circle class="t-fg" id="t-fg" cx="19" cy="19" r="15"/>
        </svg>
        <div class="t-num" id="t-num">5</div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="abtn abtn-ng" id="btn-ng" onclick="markAgain()">
      다시 학습<sub>모르겠어요</sub>
    </button>
    <button class="abtn abtn-ok" onclick="markLearned()">
      학습 완료 ✓<sub>알고있어요</sub>
    </button>
  </div>
  <div class="round-row">라운드 <span class="round-tag" id="round-tag">1</span></div>
</div>

<!-- COMPLETE -->
<div class="done-screen" id="scr-done">
  <div class="done-emoji">🎉</div>
  <div class="done-title">모두 완료!</div>
  <div class="done-sub" id="done-sub"></div>
  <button class="dbtn s" onclick="goList()">← 목록으로</button>
  <button class="dbtn s" onclick="restartCurrent()">처음부터 다시</button>
</div>

<!-- SETTINGS -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="sheet">
    <div class="sheet-title">⚙️ 설정<button class="sheet-close" onclick="closeSettings()">✕</button></div>
    <div class="srow">
      <div class="srow-label">자동 넘김 시간</div>
      <div class="srow-desc">'외웠음'을 누르지 않으면 이 시간 후 다시 학습으로 넘어갑니다</div>
      <div class="big-stepper">
        <button class="big-step-btn" onclick="pStep(-1)">−</button>
        <div class="big-num" id="big-num">5초</div>
        <button class="big-step-btn" onclick="pStep(1)">+</button>
      </div>
      <div class="pchips" id="pchips">
        <button class="pchip" onclick="pPreset(2)">2초</button>
        <button class="pchip sel" onclick="pPreset(5)">5초</button>
        <button class="pchip" onclick="pPreset(7)">7초</button>
        <button class="pchip" onclick="pPreset(10)">10초</button>
        <button class="pchip" onclick="pPreset(15)">15초</button>
        <button class="pchip" onclick="pPreset(20)">20초</button>
        <button class="pchip" onclick="pPreset(30)">30초</button>
      </div>
    </div>
    <div class="srow">
      <div class="srow-label">테마</div>
      <div class="theme-row">
        <button class="theme-pick sel" id="tp-dark" onclick="pThemeFn('dark')">🌙 다크모드</button>
        <button class="theme-pick" id="tp-light" onclick="pThemeFn('light')">☀️ 라이트모드</button>
      </div>
    </div>
    <button class="apply-btn" onclick="applySettings()">적용하기</button>
  </div>
</div>

<script>
const R = [
  {n:1,k:"一",r:"하나 일",s:"1획",a:"그냥 한 줄"},
  {n:2,k:"丨",r:"뚫을 곤",s:"1획",a:"세워진 막대"},
  {n:3,k:"丶",r:"점 주",s:"1획",a:"물방울 하나"},
  {n:4,k:"丿",r:"삐침 별",s:"1획",a:"칼로 긋는 느낌"},
  {n:5,k:"乙",r:"새 을",s:"1획",a:"구부러진 갈고리"},
  {n:6,k:"亅",r:"갈고리 궐",s:"1획",a:"낚싯바늘"},
  {n:7,k:"二",r:"두 이",s:"2획",a:"선 두 개"},
  {n:8,k:"亠",r:"머리 두",s:"2획",a:"뚜껑 모양"},
  {n:9,k:"人",r:"사람 인",s:"2획",a:"서있는 사람 (亻사람 인 변)"},
  {n:10,k:"儿",r:"어진사람 인 발",s:"2획",a:"걷는 다리"},
  {n:11,k:"入",r:"들 입",s:"2획",a:"안으로 쏙"},
  {n:12,k:"八",r:"여덟 팔",s:"2획",a:"나눔/벌어진 모양"},
  {n:13,k:"冂",r:"멀 경",s:"2획",a:"박스 틀 모양"},
  {n:14,k:"冖",r:"덮개 명",s:"2획",a:"위에서 덮는 모양"},
  {n:15,k:"冫",r:"이수 변",s:"2획",a:"얼음 결정 (氷물 빙의 변형)"},
  {n:16,k:"几",r:"안석 궤",s:"2획",a:"책상 혹은 다리 있는 구조"},
  {n:17,k:"凵",r:"입구 몸",s:"2획",a:"그릇 혹은 아래 열린 통"},

  {n:190,k:"髟",r:"터럭 발",s:"10획",a:"늘어진 머리카락 (長길 장+彡터럭 삼)"},
  {n:191,k:"鬥",r:"싸울 투",s:"10획",a:"두 사람이 싸우는 모양 (門문 문 변형)"},

  {n:198,k:"鹵",r:"소금 로",s:"11획",a:"소금기가 있는 땅 (占점칠 점+비녀 모양)"},

  {n:200,k:"麥",r:"보리 맥",s:"11획",a:"보리의 이삭과 뿌리 (來올 래+夂뒤져올 치)"},
  {n:201,k:"麻",r:"삼 마",s:"11획",a:"집안에 걸어둔 삼 줄기 (广집 엄+林수풀 림)"},
  {n:202,k:"亀",r:"거북 귀",s:"11획",a:"거북 등껍질과 발 모양 (龜의 신자체)"},
  {n:203,k:"黄",r:"누를 황",s:"11획",a:"누런 빛 (黃의 신자체)"},

  {n:207,k:"黹",r:"바느질 치",s:"12획+",a:"수놓은 무늬 모양 (业업 업+비녀 모양)"},

  {n:209,k:"鼎",r:"솥 정",s:"12획+",a:"다리가 셋 달린 큰 솥 (目눈 목+爿조각 널 상+片조각 편)"},
  {n:210,k:"鼓",r:"북 고",s:"12획+",a:"손에 채를 들고 북을 침 (壴악기 이름 주+支지탱할 지)"},
  {n:211,k:"鼠",r:"쥐 서",s:"12획+",a:"이빨과 발이 있는 쥐 (臼절구 구+삐침+灬불 화 발)"},
  {n:212,k:"鼻",r:"코 비",s:"12획+",a:"숨 쉬는 코 모양 (自스스로 자+田밭 전+丌책상 기)"},
  {n:213,k:"歯",r:"이 치",s:"12획+",a:"입안의 이빨 모양 (齒의 신자체)"},
  {n:214,k:"龠",r:"피리 약",s:"12획+",a:"구멍이 여러 개인 악기 (亼모일 집+品물건 품+구멍 모양)"},
];

const GRP={}, SO=[];
R.forEach(r=>{if(!GRP[r.s]){GRP[r.s]=[];SO.push(r.s)}GRP[r.s].push(r)});

const doneCounts={};
let deck=[],againList=[];
let curIdx=0,okCnt=0,ngCnt=0,totalLearned=0;
let showDetail=false,hintShown=false,round=1;
let curMode='all';
let isRandom=false;
let autoOn=false,autoTimer=null,autoSecs=5;
let AUTO_TIME=5;
const CIRC=94.25;
let theme='dark',pThemeVal='dark',pTimeVal=5;

function applyTheme(t){
  theme=t;
  document.body.classList.toggle('light',t==='light');
  document.getElementById('theme-top-icon').textContent=t==='light'?'🌙':'☀️';
  document.getElementById('theme-top-txt').textContent=t==='light'?'다크':'라이트';
  syncTPs(t);
}
function quickTheme(){applyTheme(theme==='dark'?'light':'dark')}
function syncTPs(t){
  const td=document.getElementById('tp-dark'),tl=document.getElementById('tp-light');
  if(td){td.classList.toggle('sel',t==='dark');tl.classList.toggle('sel',t==='light')}
}

function buildList(){
  const c=document.getElementById('group-list');c.innerHTML='';
  SO.forEach(s=>{
    const items=GRP[s],done=doneCounts[s]||0;
    const d=document.createElement('div');d.className='sg';
    d.innerHTML=`
      <div class="sg-head">
        <span class="sg-title">${s} <span style="color:var(--text3);font-size:12px;font-weight:400">(${items.length}자)</span></span>
        <div class="sg-right">
          ${done>0?`<span class="done-badge">완료 ${done}회</span>`:''}
          <button class="sg-btn" onclick="startStudy('${s}')">학습 →</button>
        </div>
      </div>
      <div class="chips">${items.map(it=>`<div class="chip"><span class="chip-k">${it.k}</span><span class="chip-r">${it.r}</span></div>`).join('')}</div>`;
    c.appendChild(d);
  });
}

function goList(){
  stopAuto();
  document.getElementById('scr-done').classList.remove('show');
  document.getElementById('scr-study').classList.remove('active');
  document.getElementById('scr-list').classList.add('active');
  buildList();
  syncOrderBtn();
}

function startStudy(mode){
  curMode=mode;
  const src=mode==='all'?R:GRP[mode];
  deck=isRandom?shuffle([...src]):[...src];
  againList=[];curIdx=0;okCnt=0;ngCnt=0;totalLearned=0;
  showDetail=false;hintShown=false;round=1;
  stopAuto();
  document.getElementById('study-title').textContent=mode==='all'?'部首 214자 전체':mode+' 부수';
  document.getElementById('study-sub').textContent='총 '+deck.length+'자';
  document.getElementById('scr-list').classList.remove('active');
  document.getElementById('scr-done').classList.remove('show');
  document.getElementById('scr-study').classList.add('active');
  syncOrderBtn();
  updateCounters();renderCard();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]]}return a}

function syncOrderBtn(){
  const btn=document.getElementById('order-btn');
  if(btn){btn.textContent=isRandom?'🔀 랜덤':'순서대로';btn.classList.toggle('on',isRandom)}
}

function toggleOrder(){
  isRandom=!isRandom;
  syncOrderBtn();
  if(document.getElementById('scr-study').classList.contains('active')&&deck.length>0){
    const remaining=deck.slice(curIdx);
    const reordered=isRandom?shuffle(remaining):[...remaining].sort((a,b)=>a.n-b.n);
    deck=[...deck.slice(0,curIdx),...reordered];
  }
}

function renderCard(){
  if(curIdx>=deck.length){
    if(againList.length>0){startAgainRound();return}
    else{showDone();return}
  }
  const it=deck[curIdx];
  document.getElementById('kanji-big').textContent=it.k;
  document.getElementById('stroke-tag').textContent=it.s;
  document.getElementById('reading').textContent=it.r;
  document.getElementById('assoc-txt').textContent=it.a;
  hintShown=false;
  document.getElementById('hint-btn').textContent='뜻 보기 👆';
  applyReveal();updateProg();
  if(autoOn)startTimer();
}

function applyReveal(){
  const det=document.getElementById('detail'),ha=document.getElementById('hint-area'),rb=document.getElementById('reveal-btn');
  if(showDetail){det.classList.remove('hide');ha.style.display='none';rb.classList.add('on');rb.textContent='👁 가리기'}
  else{det.classList.add('hide');ha.style.display='block';rb.classList.remove('on');rb.textContent='👁 전체보기'}
}
function toggleReveal(){showDetail=!showDetail;applyReveal()}
function toggleHint(){
  const det=document.getElementById('detail'),btn=document.getElementById('hint-btn');
  if(!hintShown){det.classList.remove('hide');btn.textContent='뜻 숨기기 👆';hintShown=true}
  else{det.classList.add('hide');btn.textContent='뜻 보기 👆';hintShown=false}
}

function markLearned(){stopTimer();okCnt++;totalLearned++;curIdx++;updateCounters();renderCard()}
function markAgain(){stopTimer();againList.push(deck[curIdx]);ngCnt++;curIdx++;updateCounters();renderCard()}

function updateCounters(){
  document.getElementById('cnt-ok').textContent=okCnt;
  document.getElementById('cnt-ng').textContent=ngCnt;
  document.getElementById('round-tag').textContent=round;
}
function updateProg(){
  const pct=deck.length>0?(totalLearned/deck.length)*100:0;
  document.getElementById('prog-fill').style.width=Math.min(100,pct)+'%';
  document.getElementById('prog-txt').textContent=totalLearned+' / '+deck.length;
}

function toggleAuto(){
  autoOn=!autoOn;
  const btn=document.getElementById('auto-main-btn'),wrap=document.getElementById('timer-wrap');
  if(autoOn){btn.classList.add('on');btn.textContent='⏱ ON';wrap.classList.add('show');startTimer()}
  else{btn.classList.remove('on');btn.textContent='⏱ 자동';wrap.classList.remove('show');stopTimer()}
}
function stopAuto(){
  autoOn=false;stopTimer();
  const b=document.getElementById('auto-main-btn');if(b){b.classList.remove('on');b.textContent='⏱ 자동'}
  const w=document.getElementById('timer-wrap');if(w)w.classList.remove('show');
}
function startTimer(){
  stopTimer();autoSecs=AUTO_TIME;updateRing(AUTO_TIME);
  autoTimer=setInterval(()=>{
    autoSecs-=0.1;updateRing(autoSecs);
    if(autoSecs<=0){
      stopTimer();
      const b=document.getElementById('btn-ng');b.classList.add('flash');
      setTimeout(()=>{b.classList.remove('flash');markAgain()},280);
    }
  },100);
}
function stopTimer(){if(autoTimer){clearInterval(autoTimer);autoTimer=null}}
function updateRing(s){
  const v=Math.max(0,s);
  document.getElementById('t-fg').style.strokeDashoffset=CIRC*(1-v/AUTO_TIME);
  document.getElementById('t-num').textContent=Math.ceil(v);
}
function changeTime(d){
  AUTO_TIME=Math.min(60,Math.max(1,AUTO_TIME+d));
  document.getElementById('ac-val').textContent=AUTO_TIME+'초';
  if(autoOn)startTimer();
}

function startAgainRound(){
  round++;
  deck=isRandom?shuffle([...againList]):[...againList];
  againList=[];curIdx=0;ngCnt=0;hintShown=false;
  document.getElementById('scr-done').classList.remove('show');
  document.getElementById('scr-study').classList.add('active');
  updateCounters();renderCard();
  if(autoOn)startTimer();
}

function showDone(){
  stopAuto();
  document.getElementById('scr-study').classList.remove('active');
  const ds=document.getElementById('scr-done');ds.classList.add('show');
  document.getElementById('done-sub').innerHTML=`총 ${round} 라운드 완료!<br>✅ 최종 외운 것: <strong style="color:var(--green)">${okCnt}개</strong>`;
  if(curMode==='all')SO.forEach(s=>{doneCounts[s]=(doneCounts[s]||0)+1});
  else doneCounts[curMode]=(doneCounts[curMode]||0)+1;
}
function restartCurrent(){goList();setTimeout(()=>startStudy(curMode),30)}

function openSettings(){
  pTimeVal=AUTO_TIME;pThemeVal=theme;
  document.getElementById('big-num').textContent=pTimeVal+'초';
  syncPchips(pTimeVal);syncTPs(pThemeVal);
  document.getElementById('overlay').classList.add('show');
}
function closeSettings(){document.getElementById('overlay').classList.remove('show')}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeSettings()}
function pStep(d){pTimeVal=Math.min(60,Math.max(1,pTimeVal+d));document.getElementById('big-num').textContent=pTimeVal+'초';syncPchips(pTimeVal)}
function pPreset(v){pTimeVal=v;document.getElementById('big-num').textContent=v+'초';syncPchips(v)}
function syncPchips(v){document.querySelectorAll('.pchip').forEach(c=>c.classList.toggle('sel',parseInt(c.textContent)===v))}
function pThemeFn(t){pThemeVal=t;syncTPs(t)}
function applySettings(){AUTO_TIME=pTimeVal;document.getElementById('ac-val').textContent=AUTO_TIME+'초';applyTheme(pThemeVal);if(autoOn)startTimer();closeSettings()}

buildList();
applyTheme('dark');
</script>
